

services:
  db:
    image: mysql:8.0
    container_name: clarity-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1998
      MYSQL_DATABASE: clarity_db
      MYSQL_USER: clarity_user
      MYSQL_PASSWORD: clarity_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Baris di bawah ini akan secara OTOMATIS membaca skema database Anda 
      # dan membuat tabel-tabelnya saat container database dinyalakan pertama kali.
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
    container_name: clarity-backend
    restart: always
    environment:
      # PENTING: Dalam ekosistem Docker, localhost bukan localhost komputer Anda,
      # melainkan localhost container. Oleh karena itu kita mengarahkan DB_HOST 
      # ke nama service database di atas -> 'db'
      DB_HOST: db
      DB_USER: clarity_user
      DB_PASSWORD: clarity_pass
      DB_NAME: clarity_db
      JWT_SECRET: supersecretportfolio123
      CORS_ORIGIN: http://localhost:8080,http://localhost:5173
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: clarity-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: clarity-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: 1998
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
